<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上云 MQTT</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-soft: rgba(30, 41, 59, 0.82);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --good: #34d399;
      --bad: #f87171;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.16);
      --warn: #fbbf24;
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background:
      radial-gradient(circle at top right, rgba(56,189,248,0.12), transparent 28%),
      radial-gradient(circle at top left, rgba(52,211,153,0.08), transparent 25%),
      linear-gradient(180deg, #0b1220, #111827 60%, #0f172a);
      color: var(--text);
    }
    body { padding: 16px; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .page { display: flex; flex-direction: column; gap: 14px; min-height: calc(100vh - 32px); }
    .topbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .badge, .status-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-radius: 999px;
      background: rgba(15,23,42,0.78); border: 1px solid var(--line); color: var(--muted);
    }
    .badge.online { color: var(--good); border-color: rgba(52,211,153,0.28); background: rgba(52,211,153,0.12); }
    .badge.offline { color: var(--bad); border-color: rgba(248,113,113,0.26); background: rgba(248,113,113,0.1); }
    .badge.unknown { color: var(--warn); border-color: rgba(251,191,36,0.26); background: rgba(251,191,36,0.1); }
    .status-pill.enabled { color: var(--good); border-color: rgba(52,211,153,0.28); background: rgba(52,211,153,0.12); }
    .status-pill.disabled { color: var(--bad); border-color: rgba(248,113,113,0.26); background: rgba(248,113,113,0.1); }
    .toolbar {
      display: grid; grid-template-columns: minmax(180px, 240px) minmax(180px, 240px) minmax(180px, 220px) minmax(180px, 220px);
      gap: 12px; align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field span { font-size: 12px; color: var(--muted); }
    select, input, .action-button {
      min-height: 40px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(15,23,42,0.72); color: var(--text); padding: 0 12px;
    }
    .action-button {
      background: linear-gradient(135deg, rgba(56,189,248,0.24), rgba(14,165,233,0.16));
      color: #e0f2fe; font-weight: 700;
    }
    .action-button.secondary {
      background: linear-gradient(135deg, rgba(52,211,153,0.2), rgba(16,185,129,0.12));
      color: #d1fae5;
    }
    .action-button[disabled] { cursor: not-allowed; opacity: 0.5; }
    .status-card {
      background: linear-gradient(135deg, rgba(30,41,59,0.92), rgba(15,23,42,0.9));
      border: 1px solid var(--line); border-radius: 18px; padding: 16px 18px;
      display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .status-main { display: flex; flex-direction: column; gap: 8px; }
    .status-title { color: var(--muted); font-size: 12px; letter-spacing: 0.04em; }
    .status-value { font-size: 28px; font-weight: 800; }
    .status-meta { display: flex; gap: 10px; flex-wrap: wrap; color: var(--muted); font-size: 12px; font-family: Consolas, monospace; }
    .layout {
      flex: 1; min-height: 0; display: grid; grid-template-columns: minmax(280px, 360px) 1fr; gap: 14px;
    }
    .panel {
      min-height: 0; display: flex; flex-direction: column; background: var(--panel);
      border: 1px solid var(--line); border-radius: 18px; overflow: hidden; backdrop-filter: blur(10px);
    }
    .panel-head {
      padding: 12px 14px; border-bottom: 1px solid var(--line); color: var(--muted);
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
    }
    .panel-body { flex: 1; min-height: 0; overflow: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .history-item, .message-card, .summary-block {
      border: 1px solid var(--line); border-radius: 14px; padding: 12px;
      background: var(--panel-soft); user-select: text;
    }
    .history-item {
      cursor: pointer; width: 100%; text-align: left; appearance: none;
      display: block;
    }
    .history-item.active { border-color: rgba(56,189,248,0.42); box-shadow: 0 0 0 1px rgba(56,189,248,0.2) inset; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .row + .row { margin-top: 8px; }
    .method { font-weight: 700; color: #f8fafc; }
    .time { margin-left: auto; color: var(--muted); font-size: 12px; font-family: Consolas, monospace; }
    .mini { color: var(--muted); font-size: 12px; }
    .pill {
      display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px;
      border: 1px solid var(--line); font-size: 11px; color: var(--muted);
    }
    .pill.reply { color: var(--good); border-color: rgba(52,211,153,0.26); background: rgba(52,211,153,0.12); }
    pre {
      margin: 8px 0 0; padding: 12px; border-radius: 12px; background: rgba(2,6,23,0.56);
      white-space: pre-wrap; word-break: break-all; overflow: auto; line-height: 1.55;
      font-family: Consolas, "JetBrains Mono", monospace; font-size: 12px; color: #cbd5e1;
    }
    .empty { color: var(--muted); padding: 24px; text-align: center; }
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .workspace {
      display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 14px;
    }
    .subgrid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px;
    }
    .subgrid.single { grid-template-columns: 1fr; }
    .field-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .checkline {
      display: inline-flex; align-items: center; gap: 8px; padding: 0 12px; min-height: 40px;
      border-radius: 12px; border: 1px solid var(--line); background: rgba(15,23,42,0.72); color: var(--text);
    }
    .checkline input { accent-color: var(--accent); }
    .tiny {
      min-height: 34px; padding: 0 10px; border-radius: 10px; border: 1px solid var(--line);
      background: rgba(15,23,42,0.72); color: var(--text);
    }
    .tiny.ghost { background: transparent; }
    .stat-line { display: flex; gap: 10px; flex-wrap: wrap; color: var(--muted); font-size: 12px; }
    .log-list, .progress-list { display: flex; flex-direction: column; gap: 10px; }
    .log-item {
      border: 1px solid var(--line); border-radius: 14px; background: var(--panel-soft);
      padding: 12px; display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start;
    }
    .log-item.active { border-color: rgba(56,189,248,0.42); }
    .log-item input { margin-top: 4px; accent-color: var(--accent); }
    .log-title { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .log-meta { display: flex; gap: 10px; flex-wrap: wrap; color: var(--muted); font-size: 12px; margin-top: 6px; }
    .progress-item {
      border: 1px solid var(--line); border-radius: 14px; background: var(--panel-soft);
      padding: 12px;
    }
    .progress-bar {
      width: 100%; height: 10px; border-radius: 999px; overflow: hidden;
      background: rgba(15,23,42,0.7); border: 1px solid var(--line); margin-top: 10px;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #38bdf8, #34d399);
    }
    .secret { font-family: Consolas, "JetBrains Mono", monospace; }
    @media (max-width: 980px) {
      body { padding: 12px; }
      .toolbar { grid-template-columns: 1fr; }
      .layout { grid-template-columns: 1fr; }
      .workspace { grid-template-columns: 1fr; }
      .subgrid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div id="connectionBadge" class="badge">连接未选择</div>
      <div id="debugPill" class="status-pill">Debug 未识别</div>
      <div id="airportOnlineBadge" class="badge unknown">机场状态未识别</div>
      <div id="droneOnlineBadge" class="badge unknown">无人机状态未识别</div>
      <div id="statsBadge" class="badge">0 条发送 / 0 条回调</div>
    </div>

    <div class="toolbar">
      <label class="field">
        <span>机场</span>
        <select id="airportSelect"></select>
      </label>
      <label class="field">
        <span>无人机</span>
        <select id="droneSelect"></select>
      </label>
      <button id="debugToggle" class="action-button">开启 Debug</button>
      <button id="restartBootstrap" class="action-button secondary">重启注册上线</button>
    </div>

    <div class="status-card">
      <div class="status-main">
        <div class="status-title">当前 Debug 状态</div>
        <div id="statusValue" class="status-value">暂未识别</div>
        <div id="statusMeta" class="status-meta"></div>
      </div>
      <div class="status-main">
        <div class="status-title">说明</div>
        <div class="mini">插件页面已完全运行在插件仓库中。宿主只负责提供消息快照与发送能力。</div>
      </div>
    </div>

    <div class="workspace">
      <section class="panel">
        <div class="panel-head">日志查询与选择</div>
        <div class="panel-body">
          <div class="subgrid">
            <label class="field">
              <span>开始时间</span>
              <input id="logStartTime" type="datetime-local">
            </label>
            <label class="field">
              <span>结束时间</span>
              <input id="logEndTime" type="datetime-local">
            </label>
          </div>
          <div class="field">
            <span>日志模块</span>
            <div class="field-actions">
              <label class="checkline"><input id="moduleDrone" type="checkbox" checked>飞行器</label>
              <label class="checkline"><input id="moduleDock" type="checkbox" checked>机场</label>
            </div>
          </div>
          <div class="field-actions">
            <button id="queryLogsBtn" class="action-button">查询可上传日志</button>
            <button id="selectAllLogsBtn" class="tiny">全选筛选结果</button>
            <button id="clearLogSelectionBtn" class="tiny ghost">清空已选</button>
          </div>
          <div id="logStats" class="stat-line"></div>
          <div id="logList" class="log-list"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">OSS 配置与上传进度</div>
        <div class="panel-body">
          <div class="subgrid">
            <label class="field">
              <span>配置档案</span>
              <select id="ossProfileSelect"></select>
            </label>
            <label class="field">
              <span>档案名称</span>
              <input id="ossProfileName" type="text" placeholder="例如 默认阿里云">
            </label>
          </div>
          <div class="field-actions">
            <button id="saveOssBtn" class="tiny">保存当前配置</button>
            <button id="newOssBtn" class="tiny">新建配置</button>
            <button id="deleteOssBtn" class="tiny ghost">删除配置</button>
          </div>
          <div class="subgrid">
            <label class="field">
              <span>Provider</span>
              <select id="ossProvider">
                <option value="ali">ali</option>
                <option value="aws">aws</option>
                <option value="minio">minio</option>
              </select>
            </label>
            <label class="field">
              <span>Region</span>
              <input id="ossRegion" type="text" placeholder="例如 hz">
            </label>
            <label class="field">
              <span>Bucket</span>
              <input id="ossBucket" type="text" placeholder="对象存储桶名称">
            </label>
            <label class="field">
              <span>Endpoint</span>
              <input id="ossEndpoint" type="text" placeholder="https://oss-cn-hangzhou.aliyuncs.com">
            </label>
            <label class="field">
              <span>上传前缀</span>
              <input id="ossKeyPrefix" type="text" placeholder="例如 dock-logs/prod">
            </label>
            <label class="field">
              <span>Expire</span>
              <input id="ossExpire" type="number" placeholder="毫秒时间戳">
            </label>
            <label class="field">
              <span>Access Key ID</span>
              <input id="ossAccessKeyId" class="secret" type="text">
            </label>
            <label class="field">
              <span>Access Key Secret</span>
              <input id="ossAccessKeySecret" class="secret" type="password">
            </label>
          </div>
          <label class="field">
            <span>Security Token</span>
            <input id="ossSecurityToken" class="secret" type="text">
          </label>
          <div class="field-actions">
            <button id="uploadSelectedBtn" class="action-button secondary">上传已选日志</button>
            <button id="cancelUploadBtn" class="tiny ghost">取消上传</button>
          </div>
          <div id="uploadSummary" class="stat-line"></div>
          <div id="progressList" class="progress-list"></div>
        </div>
      </section>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">发送历史</div>
        <div id="historyList" class="panel-body"></div>
      </section>
      <section class="panel">
        <div class="panel-head">详情</div>
        <div id="detailPane" class="panel-body"></div>
      </section>
    </div>
  </div>

  <script>
    const host = window.MqttMountainHost || {};
    const bridge = host.bridge;
    const api = host.api || {};
    const OSS_STORAGE_KEY = 'mm.plugin.dji.oss-profiles.v1';
    const state = {
      airport: 'all',
      drone: 'all',
      selectedHistoryKey: null,
      snapshot: null,
      actionBusy: false,
      logEntries: [],
      selectedLogKeys: {},
      ossProfiles: [],
      activeOssProfileId: '',
      uploadRequest: null
    };

    const airportSelect = document.getElementById('airportSelect');
    const droneSelect = document.getElementById('droneSelect');
    const connectionBadge = document.getElementById('connectionBadge');
    const debugPill = document.getElementById('debugPill');
    const airportOnlineBadge = document.getElementById('airportOnlineBadge');
    const droneOnlineBadge = document.getElementById('droneOnlineBadge');
    const statsBadge = document.getElementById('statsBadge');
    const statusValue = document.getElementById('statusValue');
    const statusMeta = document.getElementById('statusMeta');
    const debugToggle = document.getElementById('debugToggle');
    const restartBootstrap = document.getElementById('restartBootstrap');
    const logStartTime = document.getElementById('logStartTime');
    const logEndTime = document.getElementById('logEndTime');
    const moduleDrone = document.getElementById('moduleDrone');
    const moduleDock = document.getElementById('moduleDock');
    const queryLogsBtn = document.getElementById('queryLogsBtn');
    const selectAllLogsBtn = document.getElementById('selectAllLogsBtn');
    const clearLogSelectionBtn = document.getElementById('clearLogSelectionBtn');
    const logStats = document.getElementById('logStats');
    const logList = document.getElementById('logList');
    const ossProfileSelect = document.getElementById('ossProfileSelect');
    const ossProfileName = document.getElementById('ossProfileName');
    const ossProvider = document.getElementById('ossProvider');
    const ossRegion = document.getElementById('ossRegion');
    const ossBucket = document.getElementById('ossBucket');
    const ossEndpoint = document.getElementById('ossEndpoint');
    const ossKeyPrefix = document.getElementById('ossKeyPrefix');
    const ossExpire = document.getElementById('ossExpire');
    const ossAccessKeyId = document.getElementById('ossAccessKeyId');
    const ossAccessKeySecret = document.getElementById('ossAccessKeySecret');
    const ossSecurityToken = document.getElementById('ossSecurityToken');
    const saveOssBtn = document.getElementById('saveOssBtn');
    const newOssBtn = document.getElementById('newOssBtn');
    const deleteOssBtn = document.getElementById('deleteOssBtn');
    const uploadSelectedBtn = document.getElementById('uploadSelectedBtn');
    const cancelUploadBtn = document.getElementById('cancelUploadBtn');
    const uploadSummary = document.getElementById('uploadSummary');
    const progressList = document.getElementById('progressList');
    const historyList = document.getElementById('historyList');
    const detailPane = document.getElementById('detailPane');
    let lastRenderToken = '';

    function safeParse(text) {
      try { return JSON.parse(text); } catch { return null; }
    }

    function timeText(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function shortTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const pad = (n) => String(n).padStart(2, '0');
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function toMs(ts) {
      if (!ts) return 0;
      return ts > 1e12 ? ts : ts * 1000;
    }

    function bytesText(size) {
      const n = Number(size || 0);
      if (n >= 1024 * 1024 * 1024) return `${(n / 1024 / 1024 / 1024).toFixed(2)} GB`;
      if (n >= 1024 * 1024) return `${(n / 1024 / 1024).toFixed(2)} MB`;
      if (n >= 1024) return `${(n / 1024).toFixed(2)} KB`;
      return `${n} B`;
    }

    function moduleLabel(moduleCode) {
      return String(moduleCode) === '0' ? '飞行器' : String(moduleCode) === '3' ? '机场' : `模块 ${moduleCode}`;
    }

    function formatDateInput(ms) {
      if (!ms) return '';
      const d = new Date(ms);
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function parseDateInput(value, fallback) {
      if (!value) return fallback;
      const ms = new Date(value).getTime();
      return Number.isFinite(ms) ? ms : fallback;
    }

    function createProfileId() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
    }

    function emptyOssProfile(name) {
      return {
        id: createProfileId(),
        name: name || '默认配置',
        provider: 'ali',
        region: '',
        bucket: '',
        endpoint: '',
        keyPrefix: '',
        expire: '',
        access_key_id: '',
        access_key_secret: '',
        security_token: ''
      };
    }

    function loadOssProfiles() {
      try {
        const raw = JSON.parse(localStorage.getItem(OSS_STORAGE_KEY) || '{}');
        const profiles = Array.isArray(raw.profiles) && raw.profiles.length ? raw.profiles : [emptyOssProfile('默认配置')];
        state.ossProfiles = profiles;
        state.activeOssProfileId = raw.activeOssProfileId || profiles[0].id;
      } catch {
        state.ossProfiles = [emptyOssProfile('默认配置')];
        state.activeOssProfileId = state.ossProfiles[0].id;
      }
    }

    function saveOssProfiles() {
      localStorage.setItem(OSS_STORAGE_KEY, JSON.stringify({
        activeOssProfileId: state.activeOssProfileId,
        profiles: state.ossProfiles
      }));
    }

    function activeOssProfile() {
      return state.ossProfiles.find((item) => item.id === state.activeOssProfileId) || state.ossProfiles[0] || null;
    }

    function fillOssForm(profile) {
      const current = profile || emptyOssProfile();
      ossProfileName.value = current.name || '';
      ossProvider.value = current.provider || 'ali';
      ossRegion.value = current.region || '';
      ossBucket.value = current.bucket || '';
      ossEndpoint.value = current.endpoint || '';
      ossKeyPrefix.value = current.keyPrefix || '';
      ossExpire.value = current.expire || '';
      ossAccessKeyId.value = current.access_key_id || '';
      ossAccessKeySecret.value = current.access_key_secret || '';
      ossSecurityToken.value = current.security_token || '';
    }

    function syncOssProfileFromForm() {
      const profile = activeOssProfile();
      if (!profile) return null;
      profile.name = ossProfileName.value.trim() || profile.name || '未命名配置';
      profile.provider = ossProvider.value;
      profile.region = ossRegion.value.trim();
      profile.bucket = ossBucket.value.trim();
      profile.endpoint = ossEndpoint.value.trim();
      profile.keyPrefix = ossKeyPrefix.value.trim();
      profile.expire = ossExpire.value.trim();
      profile.access_key_id = ossAccessKeyId.value.trim();
      profile.access_key_secret = ossAccessKeySecret.value.trim();
      profile.security_token = ossSecurityToken.value.trim();
      return profile;
    }

    function renderOssProfiles() {
      if (!state.ossProfiles.length) {
        state.ossProfiles = [emptyOssProfile('默认配置')];
        state.activeOssProfileId = state.ossProfiles[0].id;
      }
      ossProfileSelect.innerHTML = state.ossProfiles.map((item) =>
        `<option value="${item.id}">${item.name || '未命名配置'}</option>`
      ).join('');
      ossProfileSelect.value = state.activeOssProfileId;
      fillOssForm(activeOssProfile());
    }

    function historyKey(item) {
      return `${item.time}:${item.topic}:${item.payload}`;
    }

    function closestHistoryItem(target) {
      let el = target && target.nodeType === 1 ? target : target && target.parentElement ? target.parentElement : null;
      while (el) {
        if (el.classList && el.classList.contains('history-item')) return el;
        el = el.parentElement;
      }
      return null;
    }

    function cloudMeta(row) {
      const meta = row && row.decoded && row.decoded.meta;
      return meta && meta.family === 'dji-shangyun' ? meta : null;
    }

    function parsePublishMeta(item) {
      const topicParts = String(item.topic || '').split('/');
      const airportSn = (topicParts[0] === 'thing' || topicParts[0] === 'sys') ? topicParts[2] : undefined;
      const parsed = safeParse(item.payload) || {};
      const data = parsed.data && typeof parsed.data === 'object' ? parsed.data : {};
      const pick = (...values) => values.find((value) => typeof value === 'string' && value.trim());
      return {
        airportSn,
        droneSn: pick(parsed.drone_sn, parsed.droneSn, data.drone_sn, data.droneSn, parsed.sub_device, data.sub_device),
        tid: typeof parsed.tid === 'string' ? parsed.tid : undefined,
        bid: typeof parsed.bid === 'string' ? parsed.bid : undefined,
        seq: typeof parsed.seq === 'number' ? parsed.seq : undefined,
        method: typeof parsed.method === 'string' ? parsed.method : undefined
      };
    }

    function logEntryKey(entry) {
      return `${entry.module}:${entry.deviceSn}:${entry.bootIndex}`;
    }

    function selectedModules() {
      const modules = [];
      if (moduleDrone.checked) modules.push('0');
      if (moduleDock.checked) modules.push('3');
      return modules;
    }

    function flattenLogEntries(body) {
      const files = body && body.data && Array.isArray(body.data.files) ? body.data.files : [];
      const out = [];
      files.forEach((group) => {
        const moduleCode = String(group.module ?? '');
        const deviceSn = String(group.device_sn || '');
        const list = Array.isArray(group.list) ? group.list : [];
        list.forEach((item) => {
          out.push({
            module: moduleCode,
            deviceSn,
            bootIndex: Number(item.boot_index),
            startTime: toMs(Number(item.start_time || 0)),
            endTime: toMs(Number(item.end_time || item.end_ime || 0)),
            size: Number(item.size || 0),
            result: Number(group.result || 0)
          });
        });
      });
      return out.sort((a, b) => b.startTime - a.startTime);
    }

    function filteredLogEntries() {
      const start = parseDateInput(logStartTime.value, 0);
      const end = parseDateInput(logEndTime.value, Number.MAX_SAFE_INTEGER);
      const modules = new Set(selectedModules());
      return state.logEntries.filter((item) => {
        if (modules.size && !modules.has(String(item.module))) return false;
        if (start && item.endTime < start) return false;
        if (end && item.startTime > end) return false;
        if (state.drone !== 'all' && item.deviceSn !== state.drone) return false;
        return true;
      });
    }

    function logTimeRange(entries) {
      if (!entries.length) return null;
      let min = entries[0].startTime;
      let max = entries[0].endTime;
      entries.forEach((item) => {
        if (item.startTime < min) min = item.startTime;
        if (item.endTime > max) max = item.endTime;
      });
      return { min, max };
    }

    function currentUploadProgress(snapshot) {
      const messages = (snapshot && snapshot.messages ? snapshot.messages : []).slice().reverse();
      const latest = new Map();
      for (const row of messages) {
        const meta = cloudMeta(row);
        if (!meta || meta.method !== 'fileupload_progress') continue;
        if (state.airport !== 'all' && meta.airportSn !== state.airport) continue;
        const body = parseRowBody(row);
        const files = body && body.data && body.data.output && body.data.output.ext && Array.isArray(body.data.output.ext.files)
          ? body.data.output.ext.files
          : [];
        files.forEach((file) => {
          const key = String(file.key || `${file.module}:${file.device_sn}`);
          if (latest.has(key)) return;
          latest.set(key, {
            key: String(file.key || ''),
            module: String(file.module || ''),
            deviceSn: String(file.device_sn || ''),
            size: Number(file.size || 0),
            fingerprint: String(file.fingerprint || ''),
            progress: Number(file.progress && file.progress.progress || 0),
            uploadRate: Number(file.progress && file.progress.upload_rate || 0),
            finishTime: Number(file.progress && file.progress.finish_time || 0),
            status: String(file.progress && file.progress.status || ''),
            result: Number(file.progress && file.progress.result || 0),
            time: row.time
          });
        });
      }
      return [...latest.values()];
    }

    function buildObjectKey(profile, entry, groupedEntries) {
      const prefix = profile.keyPrefix ? profile.keyPrefix.replace(/\/+$/g, '') : `dock-logs/${state.airport}`;
      const rangeStart = timeText(groupedEntries[groupedEntries.length - 1].startTime).replace(/[:\s]/g, '-');
      const rangeEnd = timeText(groupedEntries[0].endTime).replace(/[:\s]/g, '-');
      return `${prefix}/${entry.deviceSn || state.airport}/module-${entry.module}-${rangeStart}-${rangeEnd}.log`;
    }

    function parseRowBody(row) {
      return safeParse(row && row.payload) || {};
    }

    function publishHistoryItem(topic, payload, time) {
      return { topic, payload, time };
    }

    function serviceStatusOf(row) {
      const body = parseRowBody(row);
      const data = body && typeof body.data === 'object' ? body.data : {};
      const output = data && typeof data.output === 'object' ? data.output : {};
      if (typeof output.status === 'string') return output.status;
      if (typeof data.result === 'number') return data.result === 0 ? 'ok' : 'failed';
      return null;
    }

    async function sleep(ms) {
      await new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function waitFor(predicate, timeoutMs = 20000, intervalMs = 500) {
      const started = Date.now();
      while (Date.now() - started <= timeoutMs) {
        const snapshot = getSnapshot();
        const result = predicate(snapshot);
        if (result) return result;
        await sleep(intervalMs);
      }
      throw new Error('等待设备响应超时');
    }

    async function waitForServiceAck(method, ids, sinceTime, timeoutMs = 20000) {
      return waitFor((snapshot) => {
        const messages = (snapshot && snapshot.messages) ? snapshot.messages : [];
        for (let i = messages.length - 1; i >= 0; i -= 1) {
          const row = messages[i];
          if (row.time < sinceTime) continue;
          const meta = cloudMeta(row);
          if (!meta || !meta.isReply || meta.method !== method) continue;
          if (ids.tid && meta.tid !== ids.tid) continue;
          if (ids.bid && meta.bid !== ids.bid) continue;
          const status = serviceStatusOf(row);
          if (status === 'ok') return row;
          if (status && !['sent', 'in_progress'].includes(status)) {
            throw new Error(`${method} 返回 ${status}`);
          }
        }
        return null;
      }, timeoutMs);
    }

    async function waitForAirportOnline(airportSn, sinceTime, timeoutMs = 90000) {
      return waitFor((snapshot) => {
        const messages = (snapshot && snapshot.messages) ? snapshot.messages : [];
        for (let i = messages.length - 1; i >= 0; i -= 1) {
          const row = messages[i];
          if (row.time < sinceTime) continue;
          const meta = cloudMeta(row);
          if (meta && meta.topicKind === 'osd' && meta.airportSn === airportSn) return row;
        }
        return null;
      }, timeoutMs, 1000);
    }

    async function publishService(method, airportSn, data) {
      const time = Date.now();
      const ids = {
        tid: crypto.randomUUID ? crypto.randomUUID() : String(time),
        bid: crypto.randomUUID ? crypto.randomUUID() : String(time + 1)
      };
      const body = {
        tid: ids.tid,
        bid: ids.bid,
        timestamp: time,
        method
      };
      if (data && Object.keys(data).length) body.data = data;
      const payload = JSON.stringify(body);
      const topic = `thing/product/${airportSn}/services`;
      const result = await bridge.publish({ topic, payload, qos: 1, retain: false });
      if (!result || !result.success) throw new Error((result && result.message) || `${method} 发布失败`);
      state.selectedHistoryKey = historyKey(publishHistoryItem(topic, payload, result.time || time));
      return { topic, payload, time: result.time || time, ids };
    }

    async function queryDeviceLogs() {
      if (state.airport === 'all') throw new Error('请先选择机场');
      const modules = selectedModules();
      if (!modules.length) throw new Error('至少选择一个日志模块');
      const sent = await publishService('fileupload_list', state.airport, { module_list: modules });
      const reply = await waitForServiceAck('fileupload_list', sent.ids, sent.time, 30000);
      state.logEntries = flattenLogEntries(parseRowBody(reply));
      state.selectedLogKeys = {};
      const range = logTimeRange(state.logEntries);
      if (range) {
        logStartTime.value = formatDateInput(range.min);
        logEndTime.value = formatDateInput(range.max);
      }
    }

    async function startFileUpload() {
      if (state.airport === 'all') throw new Error('请先选择机场');
      const selected = state.logEntries.filter((item) => state.selectedLogKeys[logEntryKey(item)]);
      if (!selected.length) throw new Error('请先选择要上传的日志');
      const profile = syncOssProfileFromForm();
      if (!profile) throw new Error('OSS 配置不可用');
      const required = ['bucket', 'region', 'endpoint', 'access_key_id', 'access_key_secret', 'expire'];
      for (const key of required) {
        if (!String(profile[key] || '').trim()) throw new Error(`缺少 OSS 字段: ${key}`);
      }

      const byModule = new Map();
      selected.forEach((item) => {
        const key = `${item.module}:${item.deviceSn}`;
        if (!byModule.has(key)) byModule.set(key, []);
        byModule.get(key).push(item);
      });
      const files = [...byModule.values()].map((items) => ({
        object_key: buildObjectKey(profile, items[0], items),
        module: String(items[0].module),
        list: items.map((item) => ({ boot_index: item.bootIndex }))
      }));

      const payload = {
        bucket: profile.bucket,
        region: profile.region,
        endpoint: profile.endpoint,
        provider: profile.provider,
        credentials: {
          access_key_id: profile.access_key_id,
          access_key_secret: profile.access_key_secret,
          expire: Number(profile.expire),
          security_token: profile.security_token
        },
        params: { files }
      };

      const sent = await publishService('fileupload_start', state.airport, payload);
      await waitForServiceAck('fileupload_start', sent.ids, sent.time, 30000);
      state.uploadRequest = { time: sent.time, modules: [...new Set(selected.map((item) => String(item.module)))] };
    }

    async function cancelFileUpload() {
      if (state.airport === 'all') throw new Error('请先选择机场');
      const progressRows = currentUploadProgress(getSnapshot());
      const moduleList = [...new Set(progressRows.map((item) => String(item.module)).filter(Boolean))];
      if (!moduleList.length) throw new Error('当前没有可取消的上传任务');
      const sent = await publishService('fileupload_update', state.airport, {
        status: 'cancel',
        module_list: moduleList
      });
      await waitForServiceAck('fileupload_update', sent.ids, sent.time, 30000);
    }

    function getSnapshot() {
      return bridge && typeof bridge.getSnapshot === 'function' ? bridge.getSnapshot() : null;
    }

    function snapshotToken(snapshot) {
      const lastMsg = snapshot.messages && snapshot.messages.length ? snapshot.messages[snapshot.messages.length - 1] : null;
      const lastPub = snapshot.publishHistory && snapshot.publishHistory.length ? snapshot.publishHistory[snapshot.publishHistory.length - 1] : null;
      return JSON.stringify({
        connectionId: snapshot.selectedConnectionId,
        connectionState: snapshot.selectedConnectionState,
        messageCount: snapshot.messages ? snapshot.messages.length : 0,
        publishCount: snapshot.publishHistory ? snapshot.publishHistory.length : 0,
        lastMsgTime: lastMsg ? lastMsg.time : 0,
        lastPubTime: lastPub ? lastPub.time : 0,
        airport: state.airport,
        drone: state.drone,
        selectedHistoryKey: state.selectedHistoryKey,
        actionBusy: state.actionBusy,
        logCount: state.logEntries.length,
        selectedLogs: Object.keys(state.selectedLogKeys).filter((key) => state.selectedLogKeys[key]).length,
        activeOssProfileId: state.activeOssProfileId
      });
    }

    function latestOsdStatus(messages, type, sn) {
      if (!sn || sn === 'all') return { state: 'unknown', text: type === 'airport' ? '机场未选择' : '无人机未选择', time: 0 };
      const now = Date.now();
      const recent = messages.find((row) => {
        const meta = cloudMeta(row);
        if (!meta || meta.topicKind !== 'osd') return false;
        if (type === 'airport') return meta.airportSn === sn;
        return meta.droneSn === sn;
      });
      if (!recent) return { state: 'offline', text: `${sn} 无 OSD`, time: 0 };
      const age = now - recent.time;
      if (age <= 30_000) return { state: 'online', text: `${sn} 在线`, time: recent.time };
      return { state: 'offline', text: `${sn} 离线`, time: recent.time };
    }

    function renderSelect(selectEl, values, current, allLabel) {
      const opts = ['<option value="all">' + allLabel + '</option>']
        .concat(values.map((value) => `<option value="${value}">${value}</option>`))
        .join('');
      selectEl.innerHTML = opts;
      selectEl.value = values.includes(current) || current === 'all' ? current : 'all';
    }

    function buildModel(snapshot) {
      const messages = (snapshot.messages || []).slice().reverse().filter((row) => cloudMeta(row));
      const publishEntries = (snapshot.publishHistory || []).slice().reverse().map((item) => ({
        key: historyKey(item),
        item,
        meta: parsePublishMeta(item)
      }));
      const airportSet = new Set();
      const droneSet = new Set();
      const airportScore = new Map();
      const droneScore = new Map();
      const bump = (map, key, step) => {
        if (!key) return;
        map.set(key, (map.get(key) || 0) + step);
      };
      publishEntries.forEach((entry) => {
        if (entry.meta.airportSn) {
          airportSet.add(entry.meta.airportSn);
          bump(airportScore, entry.meta.airportSn, 1);
        }
        if (entry.meta.droneSn) {
          droneSet.add(entry.meta.droneSn);
          bump(droneScore, entry.meta.droneSn, 1);
        }
      });
      messages.forEach((row) => {
        const meta = cloudMeta(row);
        if (!meta) return;
        if (meta.airportSn) {
          airportSet.add(meta.airportSn);
          bump(airportScore, meta.airportSn, 3);
        }
        if (meta.droneSn) {
          droneSet.add(meta.droneSn);
          bump(droneScore, meta.droneSn, 3);
        }
      });
      (snapshot.paramSuggestions.airportSn || []).forEach((value) => {
        airportSet.add(value);
        bump(airportScore, value, 2);
      });
      (snapshot.paramSuggestions.gateway || []).forEach((value) => {
        airportSet.add(value);
        bump(airportScore, value, 2);
      });
      (snapshot.paramSuggestions.droneSn || []).forEach((value) => {
        droneSet.add(value);
        bump(droneScore, value, 2);
      });

      const airportOptions = Array.from(airportSet)
        .filter((value) => value && (airportScore.get(value) || 0) >= (droneScore.get(value) || 0))
        .sort();
      const droneOptions = Array.from(droneSet).filter(Boolean).sort();
      const filteredHistory = publishEntries.filter((entry) => {
        if (state.airport !== 'all' && entry.meta.airportSn !== state.airport) return false;
        if (state.drone !== 'all' && entry.meta.droneSn !== state.drone) return false;
        return true;
      }).slice(0, 5);

      if (!filteredHistory.some((entry) => entry.key === state.selectedHistoryKey)) {
        state.selectedHistoryKey = filteredHistory[0] ? filteredHistory[0].key : null;
      }

      const selectedEntry = filteredHistory.find((entry) => entry.key === state.selectedHistoryKey) || null;
      const relatedRows = selectedEntry ? messages
        .filter((row) => {
          const meta = cloudMeta(row);
          if (!meta || row.time < selectedEntry.item.time) return false;
          if (selectedEntry.meta.tid && meta.tid === selectedEntry.meta.tid) return true;
          if (selectedEntry.meta.bid && meta.bid === selectedEntry.meta.bid) return true;
          if (selectedEntry.meta.seq != null && meta.seq === selectedEntry.meta.seq) return true;
          return false;
        })
        .sort((a, b) => a.time - b.time) : [];
      const callbackRows = relatedRows.filter((row) => {
        const meta = cloudMeta(row);
        return meta && meta.isReply;
      });

      let debugStatus = { state: 'unknown', time: 0, method: '', modeCode: null };
      for (const row of messages) {
        const meta = cloudMeta(row);
        if (!meta || !meta.debugState) continue;
        debugStatus = {
          state: meta.debugState,
          time: row.time,
          method: meta.method || '',
          modeCode: typeof meta.modeCode === 'number' ? meta.modeCode : null
        };
        break;
      }

      return {
        snapshot,
        airportOptions,
        droneOptions,
        filteredHistory,
        selectedEntry,
        relatedRows,
        callbackRows,
        debugStatus,
        airportOnline: latestOsdStatus(messages, 'airport', state.airport),
        droneOnline: latestOsdStatus(messages, 'drone', state.drone)
      };
    }

    function renderHistory(model) {
      if (!model.filteredHistory.length) {
        historyList.innerHTML = '<div class="empty">当前筛选下没有发送记录。</div>';
        return;
      }
      historyList.innerHTML = model.filteredHistory.map((entry) => `
        <button type="button" class="history-item ${entry.key === state.selectedHistoryKey ? 'active' : ''}" data-key="${entry.key}">
          <div class="row">
            <div class="method">${entry.meta.method || entry.item.topic}</div>
            <div class="time">${shortTime(entry.item.time)}</div>
          </div>
          <div class="row mini">
            <span>机场 ${entry.meta.airportSn || '-'}</span>
            <span>无人机 ${entry.meta.droneSn || '-'}</span>
          </div>
          <div class="row mini">
            <span>${entry.meta.tid || entry.meta.bid || (entry.meta.seq != null ? `seq ${entry.meta.seq}` : '无 tid/bid')}</span>
          </div>
        </button>
      `).join('');
    }

    function renderDetail(model) {
      const debugText = model.debugStatus.state === 'enabled' ? '已开启' : model.debugStatus.state === 'disabled' ? '已关闭' : '暂未识别';
      const metaBits = [];
      if (model.debugStatus.modeCode !== null) metaBits.push(`mode_code=${model.debugStatus.modeCode}`);
      if (model.debugStatus.method) metaBits.push(model.debugStatus.method);
      if (model.debugStatus.time) metaBits.push(timeText(model.debugStatus.time));
      statusValue.textContent = debugText;
      statusMeta.innerHTML = metaBits.map((item) => `<span>${item}</span>`).join('');

      if (!model.selectedEntry) {
        detailPane.innerHTML = '<div class="empty">请选择一条发送记录。</div>';
        return;
      }

      const selected = model.selectedEntry;
      const callbackHtml = model.callbackRows.length
        ? model.callbackRows.map((row) => {
            const meta = cloudMeta(row) || {};
            return `
              <article class="message-card">
                <div class="row">
                  <span class="pill reply">${meta.topicKind || 'reply'}</span>
                  <span class="method">${meta.method || row.topic}</span>
                  <span class="time">${timeText(row.time)}</span>
                </div>
                <div class="row mini">
                  ${meta.tid ? `<span>tid ${meta.tid}</span>` : ''}
                  ${meta.bid ? `<span>bid ${meta.bid}</span>` : ''}
                </div>
                <pre>${row.payload}</pre>
              </article>`;
          }).join('')
        : '<div class="empty">这条记录暂时还没有匹配到回调。</div>';

      const relatedHtml = model.relatedRows.length
        ? model.relatedRows.map((row) => {
            const meta = cloudMeta(row) || {};
            return `
              <article class="message-card">
                <div class="row">
                  <span class="pill ${meta.isReply ? 'reply' : ''}">${meta.topicKind || ''}</span>
                  <span class="method">${meta.method || row.topic}</span>
                  <span class="time">${timeText(row.time)}</span>
                </div>
                <div class="row mini">
                  <span>机场 ${meta.airportSn || '-'}</span>
                  <span>无人机 ${meta.droneSn || '-'}</span>
                  ${meta.tid ? `<span>tid ${meta.tid}</span>` : ''}
                  ${meta.bid ? `<span>bid ${meta.bid}</span>` : ''}
                </div>
                <pre>${row.payload}</pre>
              </article>`;
          }).join('')
        : '<div class="empty">没有找到关联链路消息。</div>';

      detailPane.innerHTML = `
        <div class="stack">
          <div class="summary-block">
            <div class="row"><span class="mini">方法</span><span class="method">${selected.meta.method || selected.item.topic}</span></div>
            <div class="row"><span class="mini">时间</span><span class="method">${timeText(selected.item.time)}</span></div>
            <div class="row"><span class="mini">标识</span><span class="method">${selected.meta.tid || selected.meta.bid || (selected.meta.seq != null ? `seq ${selected.meta.seq}` : '无 tid/bid')}</span></div>
          </div>
          <div class="summary-block">
            <div class="row"><span class="mini">关联回调</span></div>
            <div class="stack">${callbackHtml}</div>
          </div>
          <div class="summary-block">
            <div class="row"><span class="mini">关联链路消息</span></div>
            <div class="stack">${relatedHtml}</div>
          </div>
        </div>
      `;
    }

    function renderLogWorkbench(model) {
      const rows = filteredLogEntries();
      const selectedCount = rows.filter((item) => state.selectedLogKeys[logEntryKey(item)]).length;
      const totalBytes = rows.reduce((sum, item) => sum + item.size, 0);
      const rawBytes = state.logEntries.reduce((sum, item) => sum + item.size, 0);
      logStats.innerHTML = [
        `<span>筛选结果 ${rows.length} / 原始 ${state.logEntries.length} 条</span>`,
        `<span>已选 ${selectedCount} 条</span>`,
        `<span>筛选大小 ${bytesText(totalBytes)}</span>`,
        `<span>原始大小 ${bytesText(rawBytes)}</span>`
      ].join('');

      if (!rows.length) {
        logList.innerHTML = state.logEntries.length
          ? '<div class="empty">日志已经查到了，但被当前时间范围、模块或无人机筛选挡住了。现在查询成功后会自动把时间范围定位到返回日志区间，你也可以手动放宽筛选。</div>'
          : '<div class="empty">先点击“查询可上传日志”，或者调整时间范围后再筛选。</div>';
      } else {
        logList.innerHTML = rows.map((item) => {
          const key = logEntryKey(item);
          return `
            <label class="log-item ${state.selectedLogKeys[key] ? 'active' : ''}" data-key="${key}">
              <input type="checkbox" data-log-check="${key}" ${state.selectedLogKeys[key] ? 'checked' : ''}>
              <div>
                <div class="log-title">
                  <span class="method">${moduleLabel(item.module)}</span>
                  <span class="pill">${item.deviceSn || '-'}</span>
                  <span class="pill">boot ${item.bootIndex}</span>
                  <span class="pill">${bytesText(item.size)}</span>
                </div>
                <div class="log-meta">
                  <span>开始 ${timeText(item.startTime)}</span>
                  <span>结束 ${timeText(item.endTime)}</span>
                  <span>result ${item.result}</span>
                </div>
              </div>
            </label>`;
        }).join('');
      }

      const progressRows = currentUploadProgress(model.snapshot);
      const selectedProfile = activeOssProfile();
      uploadSummary.innerHTML = [
        `<span>配置 ${selectedProfile ? (selectedProfile.name || '未命名配置') : '未选择'}</span>`,
        `<span>进度项 ${progressRows.length} 条</span>`,
        state.uploadRequest ? `<span>最近上传 ${timeText(state.uploadRequest.time)}</span>` : '<span>最近上传 暂无</span>'
      ].join('');

      if (!progressRows.length) {
        progressList.innerHTML = '<div class="empty">暂无上传进度。发起上传后，这里会自动展示 fileupload_progress。</div>';
      } else {
        progressList.innerHTML = progressRows.map((item) => `
          <article class="progress-item">
            <div class="row">
              <span class="method">${item.key || item.deviceSn}</span>
              <span class="pill">${moduleLabel(item.module)}</span>
              <span class="time">${item.status || 'unknown'}</span>
            </div>
            <div class="row mini">
              <span>${item.deviceSn || '-'}</span>
              <span>${bytesText(item.size)}</span>
              <span>${item.uploadRate ? `${item.uploadRate} B/s` : '速率未知'}</span>
              <span>${item.finishTime ? `完成 ${timeText(item.finishTime)}` : '未完成'}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0, Math.min(100, item.progress))}%"></div></div>
          </article>
        `).join('');
      }
    }

    function renderTop(model) {
      const snapshot = model.snapshot;
      const currentConn = (snapshot.connections || []).find((item) => item.id === snapshot.selectedConnectionId);
      connectionBadge.textContent = currentConn
        ? `${currentConn.name} / ${currentConn.state}`
        : '连接未选择';

      debugPill.className = 'status-pill ' + (model.debugStatus.state === 'enabled' ? 'enabled' : model.debugStatus.state === 'disabled' ? 'disabled' : '');
      debugPill.textContent = 'Debug ' + (model.debugStatus.state === 'enabled' ? '已开启' : model.debugStatus.state === 'disabled' ? '已关闭' : '未识别');
      airportOnlineBadge.className = 'badge ' + model.airportOnline.state;
      airportOnlineBadge.textContent = `机场 ${model.airportOnline.text}${model.airportOnline.time ? ' / ' + shortTime(model.airportOnline.time) : ''}`;
      droneOnlineBadge.className = 'badge ' + model.droneOnline.state;
      droneOnlineBadge.textContent = `无人机 ${model.droneOnline.text}${model.droneOnline.time ? ' / ' + shortTime(model.droneOnline.time) : ''}`;
      statsBadge.textContent = `${model.filteredHistory.length} 条发送 / ${model.callbackRows.length} 条回调`;

      debugToggle.textContent = state.actionBusy
        ? '处理中...'
        : (model.debugStatus.state === 'enabled' ? '关闭 Debug' : '开启 Debug');
      debugToggle.disabled = state.actionBusy || !(snapshot.selectedConnectionId && snapshot.selectedConnectionState === 'connected' && state.airport !== 'all');
      restartBootstrap.disabled = state.actionBusy || !(snapshot.selectedConnectionId && snapshot.selectedConnectionState === 'connected' && state.airport !== 'all');
      restartBootstrap.textContent = state.actionBusy ? '执行中...' : '重启注册上线';
      queryLogsBtn.disabled = state.actionBusy || !(snapshot.selectedConnectionId && snapshot.selectedConnectionState === 'connected' && state.airport !== 'all');
      uploadSelectedBtn.disabled = state.actionBusy || !(snapshot.selectedConnectionId && snapshot.selectedConnectionState === 'connected' && state.airport !== 'all');
      cancelUploadBtn.disabled = state.actionBusy || !(snapshot.selectedConnectionId && snapshot.selectedConnectionState === 'connected' && state.airport !== 'all');
    }

    function render() {
      const snapshot = getSnapshot();
      if (!snapshot) return;
      const token = snapshotToken(snapshot);
      if (token === lastRenderToken) return;
      lastRenderToken = token;
      state.snapshot = snapshot;
      const model = buildModel(snapshot);
      renderSelect(airportSelect, model.airportOptions, state.airport, '全部机场');
      state.airport = airportSelect.value;

      const droneOptions = model.droneOptions.filter((drone) => {
        if (state.airport === 'all') return true;
        return model.filteredHistory.some((entry) => entry.meta.airportSn === state.airport && entry.meta.droneSn === drone)
          || model.snapshot.messages.some((row) => {
            const meta = cloudMeta(row);
            return meta && meta.airportSn === state.airport && meta.droneSn === drone;
          });
      });
      renderSelect(droneSelect, droneOptions, state.drone, '全部无人机');
      state.drone = droneSelect.value;

      const rerendered = buildModel(snapshot);
      renderTop(rerendered);
      renderLogWorkbench(rerendered);
      renderHistory(rerendered);
      renderDetail(rerendered);
    }

    airportSelect.addEventListener('change', () => {
      state.airport = airportSelect.value;
      state.drone = 'all';
      lastRenderToken = '';
      render();
    });

    droneSelect.addEventListener('change', () => {
      state.drone = droneSelect.value;
      lastRenderToken = '';
      render();
    });

    historyList.addEventListener('click', (event) => {
      const item = closestHistoryItem(event.target);
      if (!item) return;
      state.selectedHistoryKey = item.getAttribute('data-key');
      lastRenderToken = '';
      render();
    });

    debugToggle.addEventListener('click', async () => {
      if (!bridge || typeof bridge.publish !== 'function' || state.airport === 'all') return;
      const method = debugToggle.textContent.includes('关闭') ? 'debug_mode_close' : 'debug_mode_open';
      state.actionBusy = true;
      lastRenderToken = '';
      render();
      try {
        const sent = await publishService(method, state.airport);
        await waitForServiceAck(method, sent.ids, sent.time);
      } catch (error) {
        console.error(error);
      } finally {
        state.actionBusy = false;
        lastRenderToken = '';
        render();
      }
    });

    restartBootstrap.addEventListener('click', async () => {
      if (!bridge || typeof bridge.publish !== 'function' || state.airport === 'all') return;
      state.actionBusy = true;
      lastRenderToken = '';
      render();
      try {
        const openDebug = await publishService('debug_mode_open', state.airport);
        await waitForServiceAck('debug_mode_open', openDebug.ids, openDebug.time);

        const droneOpen = await publishService('drone_open', state.airport);
        await waitForServiceAck('drone_open', droneOpen.ids, droneOpen.time, 30000);

        const reboot = await publishService('device_reboot', state.airport);
        await waitForServiceAck('device_reboot', reboot.ids, reboot.time, 30000);
        await waitForAirportOnline(state.airport, reboot.time, 120000);

        const closeDebug = await publishService('debug_mode_close', state.airport);
        await waitForServiceAck('debug_mode_close', closeDebug.ids, closeDebug.time, 30000);
      } catch (error) {
        console.error(error);
      } finally {
        state.actionBusy = false;
        lastRenderToken = '';
        render();
      }
    });

    [logStartTime, logEndTime, moduleDrone, moduleDock].forEach((el) => {
      el.addEventListener('change', () => {
        lastRenderToken = '';
        render();
      });
    });

    queryLogsBtn.addEventListener('click', async () => {
      state.actionBusy = true;
      lastRenderToken = '';
      render();
      try {
        await queryDeviceLogs();
      } catch (error) {
        console.error(error);
      } finally {
        state.actionBusy = false;
        lastRenderToken = '';
        render();
      }
    });

    selectAllLogsBtn.addEventListener('click', () => {
      filteredLogEntries().forEach((item) => {
        state.selectedLogKeys[logEntryKey(item)] = true;
      });
      lastRenderToken = '';
      render();
    });

    clearLogSelectionBtn.addEventListener('click', () => {
      state.selectedLogKeys = {};
      lastRenderToken = '';
      render();
    });

    logList.addEventListener('change', (event) => {
      const target = event.target;
      if (!target || target.nodeType !== 1) return;
      const key = target.getAttribute('data-log-check');
      if (!key) return;
      state.selectedLogKeys[key] = !!target.checked;
      lastRenderToken = '';
      render();
    });

    ossProfileSelect.addEventListener('change', () => {
      syncOssProfileFromForm();
      state.activeOssProfileId = ossProfileSelect.value;
      saveOssProfiles();
      renderOssProfiles();
      lastRenderToken = '';
      render();
    });

    [ossProfileName, ossProvider, ossRegion, ossBucket, ossEndpoint, ossKeyPrefix, ossExpire, ossAccessKeyId, ossAccessKeySecret, ossSecurityToken]
      .forEach((el) => {
        el.addEventListener('input', () => {
          syncOssProfileFromForm();
          saveOssProfiles();
          lastRenderToken = '';
          render();
        });
      });

    saveOssBtn.addEventListener('click', () => {
      const profile = syncOssProfileFromForm();
      if (!profile) return;
      saveOssProfiles();
      renderOssProfiles();
      lastRenderToken = '';
      render();
    });

    newOssBtn.addEventListener('click', () => {
      const profile = emptyOssProfile('新配置');
      state.ossProfiles.unshift(profile);
      state.activeOssProfileId = profile.id;
      saveOssProfiles();
      renderOssProfiles();
      lastRenderToken = '';
      render();
    });

    deleteOssBtn.addEventListener('click', () => {
      if (state.ossProfiles.length <= 1) return;
      state.ossProfiles = state.ossProfiles.filter((item) => item.id !== state.activeOssProfileId);
      state.activeOssProfileId = state.ossProfiles[0].id;
      saveOssProfiles();
      renderOssProfiles();
      lastRenderToken = '';
      render();
    });

    uploadSelectedBtn.addEventListener('click', async () => {
      state.actionBusy = true;
      lastRenderToken = '';
      render();
      try {
        await startFileUpload();
      } catch (error) {
        console.error(error);
      } finally {
        state.actionBusy = false;
        lastRenderToken = '';
        render();
      }
    });

    cancelUploadBtn.addEventListener('click', async () => {
      state.actionBusy = true;
      lastRenderToken = '';
      render();
      try {
        await cancelFileUpload();
      } catch (error) {
        console.error(error);
      } finally {
        state.actionBusy = false;
        lastRenderToken = '';
        render();
      }
    });

    loadOssProfiles();
    renderOssProfiles();
    logStartTime.value = formatDateInput(Date.now() - 24 * 60 * 60 * 1000);
    logEndTime.value = formatDateInput(Date.now());
    render();
    setInterval(render, 1200);
  </script>
</body>
</html>
